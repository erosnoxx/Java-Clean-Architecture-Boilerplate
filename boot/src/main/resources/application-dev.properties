# ==== DATABASE CONFIG (H2 - dev/test) ====
spring.datasource.url=jdbc:h2:mem:erp;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ==== SECURITY CONFIG ==== #

api.security.token.secret=${SEC_KEY}
api.security.token.expirationTimeInHours=8
api.security.token.refreshExpirationTimeInHours=24
cors.allowed-origins=http://localhost:3000,http://localhost:4200

# ==== FEIGN CLIENTS ====
viaCep.api.url = https://viacep.com.br/ws
